name: NEXUS Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Project Structure and Gradle
        run: |
          # 1. Encontrar dónde está el archivo build.gradle.kts
          BUILD_FILE=$(find . -name build.gradle.kts -not -path "*/app/*" | head -n 1)
          if [ -z "$BUILD_FILE" ]; then
            echo "ERROR: No se encontró el archivo de configuración del proyecto."
            exit 1
          fi
          PROJECT_ROOT=$(dirname "$BUILD_FILE")
          echo "Proyecto detectado en: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"

          # 2. Forzar la instalación de un Gradle Wrapper limpio
          # Esto soluciona el problema de la carpeta gradle/wrapper faltante o corrupta
          gradle wrapper --gradle-version 8.2.2
          chmod +x gradlew
          
          # Guardar la ruta para los siguientes pasos
          echo "FINAL_PROJECT_PATH=$(pwd)" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd ${{ env.FINAL_PROJECT_PATH }}
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: "**/build/reports/"
          retention-days: 7
