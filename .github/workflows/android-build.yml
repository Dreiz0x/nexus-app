name: NEXUS Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Project and Run Build
        run: |
          # 1. Encontrar la raíz real del proyecto (donde está settings.gradle.kts)
          SETTINGS_FILE=$(find . -name settings.gradle.kts | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: No se encontró settings.gradle.kts. Revisa la subida de archivos."
            exit 1
          fi
          PROJECT_ROOT=$(pwd)/$(dirname "$SETTINGS_FILE")
          echo "Proyecto detectado en: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"

          # 2. Descargar un Gradle Wrapper funcional directamente de los servidores de Gradle
          # Esto soluciona el problema de la carpeta gradle/wrapper faltante o corrupta
          echo "Descargando Gradle Wrapper..."
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradlew -o gradlew
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          # 3. Configurar la versión de Gradle en el archivo de propiedades
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties

          # 4. Ejecutar la compilación
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30

      - name: Upload Build Reports
        if: failure( )
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: "**/build/reports/"
          retention-days: 7
