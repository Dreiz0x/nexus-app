name: NEXUS Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find and Fix gradlew
        run: |
          # Buscar el archivo gradlew en cualquier subcarpeta
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: No se encontró el archivo gradlew en ninguna parte del repositorio."
            exit 1
          fi
          echo "Se encontró gradlew en: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          # Guardar la ruta del directorio para los siguientes pasos
          echo "PROJECT_ROOT=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-release-apk
          path: "**/build/outputs/apk/release/*.apk"
          retention-days: 30

      - name: Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: "**/build/reports/"
          retention-days: 7
