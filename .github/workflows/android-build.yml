name: NEXUS Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Project and Run Build
        run: |
          # 1. Encontrar la raíz real del proyecto
          SETTINGS_FILE=$(find . -name settings.gradle.kts | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: No se encontró settings.gradle.kts."
            exit 1
          fi
          PROJECT_ROOT=$(pwd)/$(dirname "$SETTINGS_FILE")
          echo "Proyecto detectado en: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"

          # 2. Descargar Gradle Wrapper funcional (URLs oficiales corregidas)
          echo "Descargando Gradle Wrapper..."
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradlew -o gradlew
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.1/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          
          # 3. Configurar la distribución oficial de Gradle (URL 8.2.1 estable )
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2.1-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

          # 4. Ejecutar la compilación con límites de memoria para evitar fallos
          ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30

      - name: Upload Build Reports
        if: failure( )
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: "**/build/reports/"
          retention-days: 7
